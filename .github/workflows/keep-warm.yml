name: keep-warm

on:
  schedule:
    # Every 3 hours, 24/7 (8 runs/day). Streamlit Community Cloud sleeps an app
    # after 12h of no real (browser) traffic, so a few visits/day is plenty;
    # 3h spacing keeps us well under 12h even if GitHub skips a couple of runs.
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # allow manual run from the Actions tab

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Visit apps to keep them warm
        env:
          APP_URLS: ${{ secrets.APP_URLS }}
        run: node keepwarm.mjs

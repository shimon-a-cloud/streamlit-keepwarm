name: keep-warm

on:
  schedule:
    # Every 10 min during business hours JST.
    # GitHub cron is UTC (JST = UTC+9). UTC hours 0-14 + 22-23 == JST 07:00-23:59.
    - cron: '*/10 0-14,22-23 * * *'
  workflow_dispatch: {}   # allow manual run from the Actions tab

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (chromium)
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Visit apps to keep them warm
        env:
          APP_URLS: ${{ secrets.APP_URLS }}
        run: node keepwarm.mjs
